name: Preview on Cloudflare Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'tailwind.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro site
        run: pnpm build
        env:
          SITE: https://pr-${{ github.event.pull_request.number }}.kadkhodaei-preview.pages.dev

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=kadkhodaei-preview --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cloudflare-preview
          message: |
            ## Cloudflare Pages Preview

            | Status | URL |
            |--------|-----|
            | ✅ Deployed | ${{ steps.deploy.outputs.pages-deployment-alias-url }} |

            _Updated on push to `${{ github.head_ref }}`_
