name: Preview on Cloudflare Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          SITE: https://pr-${{ github.event.pull_request.number }}.kadkhodaei-preview.pages.dev

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist/ --project-name=kadkhodaei-preview --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-preview
          message: |
            ## Cloudflare Pages Preview

            | Status | URL |
            |--------|-----|
            | ✅ Deployed | ${{ steps.deploy.outputs.pages-deployment-alias-url }} |

            _Updated on push to `${{ github.head_ref }}`_
