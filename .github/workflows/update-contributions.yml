name: Monthly Portfolio Update

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Set up UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      
      - name: Fetch recent contributions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: arash77
          GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}
        run: python scripts/fetch_contributions.py

      - name: Fetch recent publications
        run: python scripts/fetch_publications.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet src/content/projects/ src/data/conferences.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Set date variables
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          echo "BRANCH_NAME=monthly-portfolio-$(date +%Y-%m-%d)" >> $GITHUB_ENV
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "🤖 Update portfolio for month of ${{ env.DATE }}"
          title: "📊 Monthly Portfolio Update"
          body: |
            *This PR was automatically generated by the monthly portfolio update workflow.*

            **Updates included:**
            - 💻 GitHub contributions fetched and summarized via Gemini AI
            - 📚 Publications and presentations fetched from ORCID/Crossref
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
